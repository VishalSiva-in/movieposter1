<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Movie Poster</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a0a;
    font-family: 'Georgia', serif;
  }

  .poster {
    position: relative;
    width: 420px;
    height: 620px;
    border-radius: 6px;
    overflow: hidden;
    background: linear-gradient(180deg, #1b1032 0%, #3a1650 35%, #7a1f3d 70%, #d94f2b 100%);
    box-shadow: 0 30px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05);
    color: #f4ead9;
  }

  /* Background glow / moon */
  .poster::before {
    content: "";
    position: absolute;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    width: 260px;
    height: 260px;
    background: radial-gradient(circle at 40% 40%, #ffe9b0, #ffb347 60%, transparent 75%);
    border-radius: 50%;
    filter: blur(2px);
    opacity: 0.9;
  }

  /* Silhouette skyline */
  .skyline {
    position: absolute;
    bottom: 190px;
    left: 0;
    width: 100%;
    height: 140px;
    background:
      linear-gradient(#000,#000) 0 60% / 10% 40% no-repeat,
      linear-gradient(#000,#000) 8% 40% / 8% 60% no-repeat,
      linear-gradient(#000,#000) 15% 70% / 12% 30% no-repeat,
      linear-gradient(#000,#000) 26% 20% / 9% 80% no-repeat,
      linear-gradient(#000,#000) 34% 55% / 11% 45% no-repeat,
      linear-gradient(#000,#000) 44% 10% / 10% 90% no-repeat,
      linear-gradient(#000,#000) 53% 45% / 9% 55% no-repeat,
      linear-gradient(#000,#000) 61% 65% / 12% 35% no-repeat,
      linear-gradient(#000,#000) 72% 25% / 10% 75% no-repeat,
      linear-gradient(#000,#000) 81% 50% / 9% 50% no-repeat,
      linear-gradient(#000,#000) 90% 15% / 10% 85% no-repeat;
    opacity: 0.85;
  }

  .stars {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image:
      radial-gradient(1px 1px at 20% 15%, #fff, transparent),
      radial-gradient(1px 1px at 70% 10%, #fff, transparent),
      radial-gradient(1px 1px at 85% 25%, #fff, transparent),
      radial-gradient(1px 1px at 35% 8%, #fff, transparent),
      radial-gradient(1px 1px at 55% 20%, #fff, transparent),
      radial-gradient(1px 1px at 10% 30%, #fff, transparent),
      radial-gradient(1px 1px at 92% 12%, #fff, transparent);
    opacity: 0.7;
  }

  .content {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 24px 26px 28px;
    background: linear-gradient(180deg, transparent 0%, rgba(10,5,15,0.2) 40%, rgba(10,5,15,0.85) 75%, rgba(5,2,8,0.97) 100%);
  }

  .badge-row {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }

  .badge {
    font-family: 'Trebuchet MS', sans-serif;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 4px 9px;
    border: 1px solid rgba(244,234,217,0.5);
    border-radius: 3px;
    color: #f4ead9;
  }

  .badge.gold {
    background: #d9a441;
    color: #241207;
    border-color: #d9a441;
    font-weight: bold;
  }

  .title {
    font-size: 54px;
    line-height: 0.95;
    font-weight: 900;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: linear-gradient(180deg, #ffe9b0, #d9a441 55%, #a8641a);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 4px 18px rgba(0,0,0,0.5);
    margin-bottom: 6px;
  }

  .tagline {
    font-family: 'Trebuchet MS', sans-serif;
    font-style: italic;
    font-size: 13px;
    color: #e7d9c2;
    letter-spacing: 0.5px;
    margin-bottom: 18px;
    opacity: 0.9;
  }

  .divider {
    width: 40px;
    height: 3px;
    background: #d9a441;
    margin-bottom: 16px;
    border-radius: 2px;
  }

  .credits {
    font-family: 'Trebuchet MS', sans-serif;
    font-size: 9.5px;
    letter-spacing: 0.6px;
    line-height: 1.7;
    color: #cfc3ad;
    text-transform: uppercase;
  }

  .credits b {
    color: #f4ead9;
    font-weight: 600;
  }

  .credits .studio {
    display: block;
    margin-top: 10px;
    font-size: 9px;
    letter-spacing: 1.2px;
    color: #a89a80;
  }
</style>
</head>
<body>

  <div class="poster">
    <div class="stars"></div>
    <div class="skyline"></div>

    <div class="content">
      <div class="badge-row">
        <span class="badge gold">★ Festival Selection</span>
        <span class="badge">In Theaters Oct 17</span>
      </div>

      <div class="title">Midnight<br>Echo</div>
      <div class="tagline">Some memories aren't meant to fade.</div>
      <div class="divider"></div>

      <div class="credits">
        <b>A Film by</b> R. Ashworth &nbsp;|&nbsp; <b>Starring</b> J. Calloway, M. Devereux, T. Okafor<br>
        <b>Music by</b> S. Lindqvist &nbsp;|&nbsp; <b>Cinematography</b> E. Vasquez<br>
        <span class="studio">Northlight Pictures &amp; Amber Reel Productions</span>
      </div>
    </div>
  </div>

</body>
</html>
